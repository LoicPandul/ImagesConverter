<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImagesConverter</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="main.js" defer></script>
</head>
<body data-view="empty">

  <!-- Full-window veil shown while dragging files over the window -->
  <div id="drag-overlay" aria-hidden="true">
    <div class="veil-frame">
      <span class="bracket tl"></span><span class="bracket tr"></span>
      <span class="bracket bl"></span><span class="bracket br"></span>
      <p>Release to add</p>
    </div>
  </div>

  <header id="titlebar" data-tauri-drag-region>
    <div class="titlebar-app" data-tauri-drag-region>
      <img class="titlebar-logo" src="assets/logo-64.png" alt="" width="18" height="18" data-tauri-drag-region />
      <span class="titlebar-name" data-tauri-drag-region>ImagesConverter</span>
    </div>
    <div class="titlebar-controls">
      <button id="win-min" class="win-btn" aria-label="Minimize" title="Minimize">
        <svg viewBox="0 0 10 10" aria-hidden="true"><path d="M1 5h8" /></svg>
      </button>
      <button id="win-max" class="win-btn" aria-label="Maximize" title="Maximize">
        <svg viewBox="0 0 10 10" aria-hidden="true"><rect x="1.5" y="1.5" width="7" height="7" rx="1" /></svg>
      </button>
      <button id="win-close" class="win-btn win-close" aria-label="Close" title="Close">
        <svg viewBox="0 0 10 10" aria-hidden="true"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7" /></svg>
      </button>
    </div>
  </header>

  <main id="app">

    <section id="dropzone" class="dropzone" role="button" tabindex="0"
             aria-label="Add images — drop files here, or press Enter to browse">
      <span class="bracket tl"></span><span class="bracket tr"></span>
      <span class="bracket bl"></span><span class="bracket br"></span>

      <div class="dropzone-inner">
        <svg class="dropzone-icon" viewBox="0 0 48 48" aria-hidden="true">
          <rect x="6" y="10" width="36" height="28" rx="4" fill="none" stroke="currentColor" stroke-width="2.5" />
          <circle cx="17" cy="20" r="3.4" fill="currentColor" />
          <path d="M12 33l9-10 7 8 5-5 5 7" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <p class="dropzone-title">Drop images here</p>
        <p class="dropzone-sub">or <button id="browse" class="link-btn" type="button">browse your files</button></p>
        <p class="dropzone-hint mono" aria-hidden="true">JPEG&ensp;PNG&ensp;WEBP&ensp;GIF&ensp;BMP&ensp;TIFF</p>
      </div>
    </section>

    <section id="queue" class="queue" hidden aria-label="File queue">
      <div class="queue-head">
        <h2 class="queue-title">Queue <span id="queue-count" class="mono"></span></h2>
        <div class="queue-actions">
          <button id="clear-done" class="ghost-btn" type="button" hidden>Clear finished</button>
          <button id="clear-all" class="ghost-btn" type="button">Clear all</button>
        </div>
      </div>
      <ul id="queue-list" class="queue-list"></ul>
    </section>

  </main>

  <footer id="console" class="console">
    <div class="controls-row">

      <fieldset class="format-control" id="format-control">
        <legend class="control-label">Convert to</legend>
        <div class="segmented" role="presentation">
          <input type="radio" name="format" id="fmt-jpeg" value="jpeg" />
          <label for="fmt-jpeg">JPEG</label>
          <input type="radio" name="format" id="fmt-webp" value="webp" checked />
          <label for="fmt-webp">WEBP</label>
          <input type="radio" name="format" id="fmt-png" value="png" />
          <label for="fmt-png">PNG</label>
          <span class="segment-thumb" aria-hidden="true"></span>
        </div>
      </fieldset>

      <div class="opt-group">
        <span class="control-label" id="compress-label">Max size</span>
        <div class="opt-line">
          <input type="checkbox" id="compress" class="switch" aria-labelledby="compress-label" />
          <label for="compress" class="switch-track" aria-hidden="true"><span class="switch-dot"></span></label>
          <div class="kb-field">
            <input type="text" id="max-kb" class="mono" inputmode="numeric" pattern="[0-9]*"
                   placeholder="500" maxlength="6" disabled aria-label="Maximum size in kilobytes" />
            <span class="kb-unit mono" aria-hidden="true">KB</span>
          </div>
        </div>
      </div>

      <div class="opt-group">
        <span class="control-label" id="delete-label">Delete originals</span>
        <div class="opt-line">
          <input type="checkbox" id="delete-original" class="switch" checked aria-labelledby="delete-label" />
          <label for="delete-original" class="switch-track" aria-hidden="true"><span class="switch-dot"></span></label>
        </div>
      </div>

    </div>

    <div class="action-row">
      <p id="status-line" class="status-line" role="status" aria-live="polite">Drop images to get started</p>
      <button id="convert" class="convert-btn" type="button" disabled>Convert</button>
    </div>
  </footer>

</body>
</html>
