name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: ImagesConverter-Windows.exe
            pyinstaller_args: --icon=assets/icon.ico
          - os: macos-latest
            artifact_name: ImagesConverter-macOS
            pyinstaller_args: --icon=assets/icon.ico
          - os: ubuntu-latest
            artifact_name: ImagesConverter-Linux
            pyinstaller_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --noconsole --name ImagesConverter --add-data "assets:assets" ${{ matrix.pyinstaller_args }} run.py

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: mv dist/ImagesConverter.exe dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: mv dist/ImagesConverter dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
